<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Academic Management System</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="main-container">

<div class="login-box">

<div class="left-section">

<div class="logo">
<img src="logo.png" alt="Vel Tech Logo">
<h2>Vel Tech University</h2>
</div>

<form>

<label>Username</label>
<input type="text" placeholder="Enter Username">

<label>Password</label>

<div class="password-box">
<input type="password" id="password" placeholder="Enter Password">
<i class="fa-solid fa-eye" id="togglePassword"></i>
</div>

<button type="submit">LET'S GO</button>

</form>

</div>

<div class="right-section">

<h1>ACADEMIC MANAGEMENT SYSTEM</h1>
<h2 class="student">STUDENT LOGIN</h2>

<img src="books.png" class="image">

</div>

</div>

<p class="footer">Copyright VEL TECH 2023 - Designed and Developed by Software Team - Office of CoE</p>

</div>

<script>
const togglePassword = document.querySelector('#togglePassword');
const password = document.querySelector('#password');

togglePassword.addEventListener('click', function () {
const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
password.setAttribute('type', type);
this.classList.toggle('fa-eye-slash');
});
</script>

</body>
</html>
